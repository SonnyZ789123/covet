services:
  pathcov:
    image: pathcov-image-dev

    environment:
      - ENV=dev

    volumes:
      - ./development/data:/data
      - ../pathcov:/pathcov-project/pathcov

  covet-engine:
    environment:
      - ENV=dev

    volumes:
      - ./development/data:/data
      - ../covet-engine:/covet-engine-project/covet-engine
