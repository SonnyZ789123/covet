services:
  pathcov:
    image: pathcov-image-dev

    environment:
      - ENV=dev

    volumes:
      - ./development/data:/data
      - ../pathcov:/pathcov-project/pathcov

  jdart:
    environment:
      - ENV=dev

    volumes:
      - ./development/data:/data
      - ../../jdart/:/jdart-project/jdart
