  paths:
    - '**/*.sh'
    - '**/*.py'
    - '**/*.yml'
    - '**/*.yaml'
    - 'Dockerfile'
    - '**/Dockerfile'
    - '**/Dockerfile.*'

  paths-ignore:
    - '.github/**'
    - '.licenserc.yaml'
    - 'LICENSE'
    - '**/*.md'
    - '**/*.json'
    - 'output/**'
    - 'development/**'
    - 'pathcov/configs/**'
    - 'covet-engine/configs/sut_gen.jpf'
    - 'docker-compose.sut.yml'
    - 'docker-compose.deps.yml'

  comment: on-failure

  language:
    Dockerfile:
      extensions:
        - ".dev"
      comment_style_id: PythonStyle
